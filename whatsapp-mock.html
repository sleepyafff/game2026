<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WhatsApp — Mock</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ============================================================
   Edit the CHATS array near the bottom <script> to swap in your
   game's real contacts / conversations / clue messages.
   Chat wallpaper: drop a "whatsapp-bg.png" file next to this
   HTML to replace the default doodle-pattern background.
   ============================================================ */
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
body { background:#0b0b0b; min-height:100vh; display:flex; justify-content:center; align-items:center; font-family:-apple-system,'SF Pro Display','Helvetica Neue',Arial,sans-serif; }

.iphone-17 { width:390px; height:844px; background:#000; border-radius:55px; position:relative; box-shadow:0 0 0 3px #3a3a3c,0 0 0 5px #0a0a0a,0 30px 70px rgba(0,0,0,0.9); overflow:hidden; }
.screen { width:100%; height:100%; position:relative; overflow:hidden; border-radius:55px; background:#000; }

.dynamic-island { position:absolute; top:11px; left:50%; transform:translateX(-50%); width:126px; height:36px; background:#000; border-radius:24px; z-index:90; }
.status-bar { position:absolute; top:8px; left:34px; right:34px; z-index:80; display:flex; justify-content:space-between; color:#000; font-size:15px; font-weight:600; pointer-events:none; }
.status-bar.on-dark { color:#fff; }
.status-icons { display:flex; gap:6px; align-items:center; font-size:13px; }

.app { position:absolute; inset:0; background:#000; }

/* ---------- CHAT LIST ---------- */
.chatlist-screen { position:absolute; inset:0; background:#fff; display:flex; flex-direction:column; transition:transform .32s cubic-bezier(.25,.8,.3,1); }
.wa-header { padding:52px 16px 6px; background:#fff; }
.wa-title-row { display:flex; justify-content:space-between; align-items:center; }
.wa-title { font-size:32px; font-weight:800; color:#000; }
.wa-header-icons { display:flex; gap:20px; color:#25D366; font-size:19px; }
.wa-tabs { display:flex; gap:22px; padding:14px 4px 10px; border-bottom:1px solid #e5e5e5; margin-top:6px; }
.wa-tab { font-size:14px; font-weight:600; color:#8e8e93; padding-bottom:8px; }
.wa-tab.active { color:#000; border-bottom:2.5px solid #25D366; }
.wa-search { margin:10px 16px; background:#f0f0f0; border-radius:10px; padding:8px 12px; display:flex; align-items:center; gap:8px; color:#8e8e93; font-size:14px; }

.chat-rows { flex:1; overflow-y:auto; scrollbar-width:none; }
.chat-rows::-webkit-scrollbar{ display:none; }
.chat-row { display:flex; align-items:center; gap:12px; padding:9px 16px; cursor:pointer; }
.chat-row:active { background:#f5f5f5; }
.chat-avatar { width:52px; height:52px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; font-size:18px; flex-shrink:0; }
.chat-mid { flex:1; min-width:0; border-bottom:1px solid #eee; padding-bottom:9px; }
.chat-top-row { display:flex; justify-content:space-between; align-items:baseline; }
.chat-name { font-size:16.5px; font-weight:600; color:#000; }
.chat-time { font-size:12.5px; color:#8e8e93; flex-shrink:0; }
.chat-time.unread { color:#25D366; font-weight:700; }
.chat-bottom-row { display:flex; justify-content:space-between; align-items:center; margin-top:2px; }
.chat-preview { font-size:14px; color:#8e8e93; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:250px; display:flex; align-items:center; gap:4px; }
.chat-preview .ticks { color:#4fc3f7; font-size:13px; }
.unread-badge { background:#25D366; color:#fff; font-size:12px; font-weight:700; min-width:20px; height:20px; border-radius:10px; display:flex; align-items:center; justify-content:center; padding:0 6px; }
.muted-icon { color:#b5b5b5; font-size:13px; }

.wa-bottom-tabs { display:flex; justify-content:space-around; padding:8px 0 26px; background:#f7f7f7; border-top:0.5px solid #d8d8d8; }
.wa-bottom-tab { display:flex; flex-direction:column; align-items:center; gap:3px; color:#8e8e93; font-size:10px; font-weight:600; }
.wa-bottom-tab i { font-size:20px; }
.wa-bottom-tab.active { color:#25D366; }

/* ---------- CONVERSATION ---------- */
.conversation-screen {
    position:absolute; inset:0; background:#e9ddc9;
    background-image:
      radial-gradient(rgba(0,0,0,0.025) 1px, transparent 1px),
      linear-gradient(160deg,#e9ddc9,#dfd3ba);
    background-size:22px 22px, cover;
    display:flex; flex-direction:column;
    transform:translateX(100%); transition:transform .32s cubic-bezier(.25,.8,.3,1);
}
.conversation-screen.open { transform:translateX(0); }
.conv-header {
    background:#f7f7f7; padding:52px 10px 10px; display:flex; align-items:center; gap:8px;
    border-bottom:0.5px solid #d0d0d0;
}
.conv-back { color:#25D366; font-size:22px; padding:4px 2px; cursor:pointer; }
.conv-avatar { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; font-size:14px; }
.conv-info { flex:1; min-width:0; }
.conv-name { font-size:15.5px; font-weight:700; color:#000; }
.conv-status { font-size:12px; color:#8e8e93; margin-top:1px; }
.conv-icons { display:flex; gap:20px; color:#25D366; font-size:18px; padding-right:6px; }

.msg-thread { flex:1; overflow-y:auto; padding:14px 10px; display:flex; flex-direction:column; gap:6px; scrollbar-width:none; }
.msg-thread::-webkit-scrollbar{ display:none; }
.msg-date-pill { align-self:center; background:rgba(255,255,255,0.75); color:#5c5c5c; font-size:11.5px; font-weight:600; padding:4px 12px; border-radius:8px; margin:6px 0; }
.bubble { max-width:76%; padding:7px 9px 6px; border-radius:9px; font-size:14.5px; line-height:1.32; position:relative; box-shadow:0 1px 1px rgba(0,0,0,0.08); }
.bubble.in { align-self:flex-start; background:#fff; border-top-left-radius:2px; }
.bubble.out { align-self:flex-end; background:#dcf8c6; border-top-right-radius:2px; }
.bubble .msg-meta { display:flex; justify-content:flex-end; align-items:center; gap:3px; margin-top:2px; font-size:10.5px; color:#8e8e93; }
.bubble .msg-meta .ticks { color:#4fc3f7; font-size:12px; }

.wa-input-bar { display:flex; align-items:flex-end; gap:8px; padding:8px 10px 26px; background:#f7f7f7; }
.wa-input-plus { color:#8e8e93; font-size:22px; padding:6px; }
.wa-input-field { flex:1; background:#fff; border:0.5px solid #d8d8d8; border-radius:20px; padding:9px 14px; font-size:14.5px; color:#8e8e93; display:flex; align-items:center; gap:8px; }
.wa-input-field .cam-mini { color:#8e8e93; font-size:16px; margin-left:auto; }
.wa-send { width:34px; height:34px; border-radius:50%; background:#25D366; color:#fff; display:flex; align-items:center; justify-content:center; font-size:14px; }

/* ---------- Embedded mode: loaded inside phone-mock.html's app overlay ---------- */
body.embedded { background:transparent; }
body.embedded .iphone-17 { width:100%; height:100%; border-radius:0; box-shadow:none; background:transparent; }
body.embedded .dynamic-island,
body.embedded .status-bar { display:none; }
</style>
</head>
<body>
<div class="iphone-17">
  <div class="screen">
    <div class="dynamic-island"></div>
    <div class="status-bar" id="statusBar"><span id="statusTime">9:41</span><div class="status-icons"><i class="fas fa-signal"></i><i class="fas fa-wifi"></i><i class="fas fa-battery-three-quarters"></i></div></div>

    <div class="app">
      <!-- CHAT LIST -->
      <div class="chatlist-screen" id="chatListScreen">
        <div class="wa-header">
          <div class="wa-title-row">
            <div class="wa-title">Chats</div>
            <div class="wa-header-icons"><i class="fas fa-camera"></i><i class="fas fa-pen-to-square"></i></div>
          </div>
          <div class="wa-tabs">
            <div class="wa-tab">Updates</div>
            <div class="wa-tab">Calls</div>
            <div class="wa-tab active">Chats</div>
          </div>
          <div class="wa-search"><i class="fas fa-magnifying-glass"></i><span>Search</span></div>
        </div>
        <div class="chat-rows" id="chatRows"></div>
        <div class="wa-bottom-tabs">
          <div class="wa-bottom-tab"><i class="fas fa-circle-notch"></i><span>Updates</span></div>
          <div class="wa-bottom-tab"><i class="fas fa-phone"></i><span>Calls</span></div>
          <div class="wa-bottom-tab"><i class="fas fa-users"></i><span>Communities</span></div>
          <div class="wa-bottom-tab active"><i class="fas fa-comment"></i><span>Chats</span></div>
          <div class="wa-bottom-tab"><i class="fas fa-gear"></i><span>Settings</span></div>
        </div>
      </div>

      <!-- CONVERSATION -->
      <div class="conversation-screen" id="conversationScreen">
        <div class="conv-header">
          <div class="conv-back" id="convBack"><i class="fas fa-chevron-left"></i></div>
          <div class="conv-avatar" id="convAvatar"></div>
          <div class="conv-info"><div class="conv-name" id="convName"></div><div class="conv-status" id="convStatus"></div></div>
          <div class="conv-icons"><i class="fas fa-video"></i><i class="fas fa-phone"></i></div>
        </div>
        <div class="msg-thread" id="msgThread"></div>
        <div class="wa-input-bar">
          <i class="fas fa-plus-circle wa-input-plus"></i>
          <div class="wa-input-field"><span>Message</span><i class="fas fa-microphone cam-mini"></i><i class="fas fa-camera cam-mini"></i></div>
          <div class="wa-send"><i class="fas fa-microphone"></i></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
"use strict";

/* If loaded inside phone-mock.html's app overlay, strip the duplicate
   phone frame / status bar so it blends into the parent's chrome. */
if (new URLSearchParams(location.search).get('embedded') === '1') {
    document.body.classList.add('embedded');
}

/* ====================================================================
   EDIT THIS DATA to swap in your game's real contacts / clue messages.
   avatarColor: any CSS color. initials: shown if no photo.
   ticks: "sent" | "delivered" | "read" | "" (outgoing messages only)
   ==================================================================== */
const CHATS = [
    {
        id:"rohan", name:"Rohan", initials:"R", avatarColor:"#7d5fff",
        online:true, muted:false,
        messages:[
            {date:"Yesterday"},
            {from:"in",  text:"Where are you? You're not picking up", time:"9:14 PM"},
            {from:"out", text:"I'm fine, just needed space", time:"9:20 PM", ticks:"read"},
            {from:"in",  text:"That's not an answer", time:"9:21 PM"},
            {date:"Today"},
            {from:"in",  text:"Please just call me back", time:"11:02 AM"},
        ]
    },
    {
        id:"mom", name:"Mom", initials:"M", avatarColor:"#ff6b81",
        online:false, muted:false,
        messages:[
            {date:"Today"},
            {from:"in",  text:"Did you eat dinner?", time:"7:45 PM"},
            {from:"out", text:"Yes mom, don't worry :)", time:"7:52 PM", ticks:"read"},
        ]
    },
    {
        id:"unknown", name:"Unknown Number", initials:"?", avatarColor:"#8e8e93",
        online:false, muted:true,
        messages:[
            {date:"Tuesday"},
            {from:"in", text:"We need to talk. Not over text.", time:"2:13 AM"},
        ]
    },
    {
        id:"priya", name:"Priya", initials:"P", avatarColor:"#ffb648",
        online:false, muted:false,
        messages:[
            {date:"Monday"},
            {from:"in",  text:"Still on for coffee tomorrow?", time:"6:30 PM"},
            {from:"out", text:"yes!! can't wait", time:"6:31 PM", ticks:"read"},
        ]
    },
];

const chatRows = document.getElementById('chatRows');
const chatListScreen = document.getElementById('chatListScreen');
const conversationScreen = document.getElementById('conversationScreen');
const msgThread = document.getElementById('msgThread');
const convName = document.getElementById('convName');
const convStatus = document.getElementById('convStatus');
const convAvatar = document.getElementById('convAvatar');

function lastMsg(chat){
    for (let i=chat.messages.length-1; i>=0; i--){ if (chat.messages[i].text) return chat.messages[i]; }
    return null;
}
function ticksIcon(t){
    if (t==="read") return '<i class="fas fa-check-double ticks"></i>';
    if (t==="delivered") return '<i class="fas fa-check-double" style="color:#8e8e93;font-size:12px"></i>';
    if (t==="sent") return '<i class="fas fa-check" style="color:#8e8e93;font-size:12px"></i>';
    return '';
}

CHATS.forEach(chat=>{
    const last = lastMsg(chat);
    const unread = chat.id==="rohan" ? 2 : 0; // sample unread state — wire to your own data as needed
    const row = document.createElement('div');
    row.className = 'chat-row';
    row.innerHTML = `
        <div class="chat-avatar" style="background:${chat.avatarColor}">${chat.initials}</div>
        <div class="chat-mid">
            <div class="chat-top-row">
                <span class="chat-name">${chat.name}</span>
                <span class="chat-time ${unread?'unread':''}">${last ? last.time : ''}</span>
            </div>
            <div class="chat-bottom-row">
                <span class="chat-preview">${last && last.from==='out' ? ticksIcon(last.ticks) : ''} ${last ? last.text : ''}</span>
                ${unread ? `<span class="unread-badge">${unread}</span>` : (chat.muted ? '<i class="fas fa-volume-xmark muted-icon"></i>' : '')}
            </div>
        </div>`;
    row.addEventListener('click', ()=> openChat(chat));
    chatRows.appendChild(row);
});

function openChat(chat){
    convName.textContent = chat.name;
    convStatus.textContent = chat.online ? 'online' : 'tap here for contact info';
    convAvatar.textContent = chat.initials;
    convAvatar.style.background = chat.avatarColor;
    msgThread.innerHTML = chat.messages.map(m=>{
        if (m.date) return `<div class="msg-date-pill">${m.date}</div>`;
        return `<div class="bubble ${m.from}">${m.text}<div class="msg-meta"><span>${m.time}</span>${m.from==='out'?ticksIcon(m.ticks):''}</div></div>`;
    }).join('');
    conversationScreen.classList.add('open');
    msgThread.scrollTop = msgThread.scrollHeight;
}
document.getElementById('convBack').addEventListener('click', ()=> conversationScreen.classList.remove('open'));

function updateClock(){
    const now = new Date();
    document.getElementById('statusTime').textContent = now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
}
updateClock(); setInterval(updateClock, 30000);
})();
</script>
</body>
</html>
